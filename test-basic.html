<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础测试</title>
    <style>
        body { 
            font-family: Arial; 
            padding: 20px; 
            background: #f0f0f0; 
        }
        .test-box {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #1976d2; }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 4px;
            display: none;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
    </style>
</head>
<body>
    <h1>JavaScript 基础测试</h1>
    
    <div class="test-box">
        <h2>测试1：最简单的按钮</h2>
        <button onclick="alert('按钮1正常工作！')">测试按钮1 (onclick)</button>
        <div id="result1" class="result"></div>
    </div>
    
    <div class="test-box">
        <h2>测试2：addEventListener</h2>
        <button id="btn2">测试按钮2 (addEventListener)</button>
        <div id="result2" class="result"></div>
    </div>
    
    <div class="test-box">
        <h2>测试3：DOMContentLoaded后绑定</h2>
        <button id="btn3">测试按钮3 (DOM加载后)</button>
        <div id="result3" class="result"></div>
    </div>
    
    <div class="test-box">
        <h2>测试4：加载外部JS模块</h2>
        <button id="btn4">测试模块加载</button>
        <div id="result4" class="result"></div>
    </div>
    
    <div class="test-box">
        <h2>测试5：完整初始化流程</h2>
        <button id="btn5">模拟app初始化</button>
        <div id="result5" class="result"></div>
    </div>

    <script>
        // 测试2：直接绑定
        console.log('脚本开始执行');
        
        document.getElementById('btn2').addEventListener('click', function() {
            document.getElementById('result2').style.display = 'block';
            document.getElementById('result2').textContent = '✓ addEventListener正常工作';
        });
        
        console.log('btn2事件已绑定');
    </script>
    
    <script>
        // 测试3：DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded事件触发');
            
            document.getElementById('btn3').addEventListener('click', function() {
                document.getElementById('result3').style.display = 'block';
                document.getElementById('result3').textContent = '✓ DOMContentLoaded正常工作';
            });
            
            console.log('btn3事件已绑定');
        });
    </script>
    
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script>
        // 测试4：检查外部模块
        document.getElementById('btn4').addEventListener('click', function() {
            const result4 = document.getElementById('result4');
            result4.style.display = 'block';
            
            let html = '';
            const checks = {
                'NOVEL_GENRES': typeof NOVEL_GENRES !== 'undefined',
                'DEFAULT_NOVEL_DATA': typeof DEFAULT_NOVEL_DATA !== 'undefined',
                'StorageManager': typeof StorageManager !== 'undefined',
                'storage': typeof storage !== 'undefined'
            };
            
            for (const [name, ok] of Object.entries(checks)) {
                html += `<div style="color: ${ok ? 'green' : 'red'}">${ok ? '✓' : '✗'} ${name}</div>`;
            }
            
            result4.innerHTML = html;
        });
        
        // 测试5：模拟完整初始化
        document.getElementById('btn5').addEventListener('click', function() {
            const result5 = document.getElementById('result5');
            result5.style.display = 'block';
            result5.className = 'result';
            
            try {
                // 检查所有必需对象
                if (typeof storage === 'undefined') {
                    throw new Error('storage未定义');
                }
                
                // 尝试加载数据
                const data = storage.load();
                
                result5.innerHTML = `
                    <div style="color: green">✓ 初始化成功</div>
                    <div>数据标题: ${data.outline.title || '(空)'}</div>
                    <div>volumes: ${data.outline.volumes.length}</div>
                `;
            } catch (error) {
                result5.className = 'result error';
                result5.innerHTML = `<div style="color: red">✗ 错误: ${error.message}</div>`;
            }
        });
        
        console.log('所有事件绑定完成');
    </script>
</body>
</html>
